name: control-plane-worker

on:
  push:
    branches: [main]
    paths:
      - "packages/control-plane-worker/**"
      - "packages/protocol/**"
      - ".github/workflows/control-plane-worker.yml"
      - "bun.lock"
      - "package.json"
  workflow_dispatch:

concurrency: control-plane-worker-${{ github.ref_name }}

jobs:
  validate_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - shell: bash
        run: bun install --frozen-lockfile
      - shell: bash
        run: bun test packages/control-plane-worker/test/index.test.ts
      - shell: bash
        run: bun run --filter=@offdex/control-plane-worker typecheck
      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN is not set; skipping deploy."
            exit 0
          fi
          cd packages/control-plane-worker
          bunx wrangler deploy
