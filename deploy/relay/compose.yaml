services:
  relay:
    build:
      context: ../..
      dockerfile: packages/relay/Dockerfile
    environment:
      OFFDEX_RELAY_HOST: 0.0.0.0
      OFFDEX_RELAY_PORT: 42421
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - relay
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
